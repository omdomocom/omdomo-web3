<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Om Domo NFT — Collection Image</title>
<style>
  body { margin: 0; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; gap: 20px; }
  canvas { border-radius: 16px; box-shadow: 0 0 60px rgba(139,92,246,0.4); }
  button { padding: 12px 32px; background: linear-gradient(135deg, #7c3aed, #06b6d4); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; }
  button:hover { opacity: 0.9; }
  p { color: #666; font-size: 13px; }
</style>
</head>
<body>
<canvas id="c" width="1000" height="1000"></canvas>
<button onclick="download()">Descargar imagen (1000×1000 PNG)</button>
<p>Sube este PNG como imagen de colección en Thirdweb</p>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 1000, H = 1000;

// ── Fondo degradado ──────────────────────────────────────────────────────────
const bg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W*0.8);
bg.addColorStop(0,   '#1a0a2e');
bg.addColorStop(0.4, '#0c0906');
bg.addColorStop(1,   '#000000');
ctx.fillStyle = bg;
ctx.fillRect(0, 0, W, H);

// ── Orbes de luz ─────────────────────────────────────────────────────────────
function orb(x, y, r, color) {
  const g = ctx.createRadialGradient(x, y, 0, x, y, r);
  g.addColorStop(0, color);
  g.addColorStop(1, 'transparent');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
}
orb(200, 200, 300, 'rgba(124,58,237,0.25)');
orb(800, 800, 280, 'rgba(245,158,11,0.18)');
orb(800, 200, 200, 'rgba(6,182,212,0.15)');
orb(200, 800, 220, 'rgba(139,92,246,0.15)');

// ── Círculo zodiacal ─────────────────────────────────────────────────────────
const cx = W / 2, cy = H / 2;
const R_outer = 370;
const R_inner = 310;
const zodiacSymbols = ['♈','♉','♊','♋','♌','♍','♎','♏','♐','♑','♒','♓'];
const zodiacColors = [
  '#f97316','#22c55e','#06b6d4','#8b5cf6',
  '#f97316','#22c55e','#06b6d4','#8b5cf6',
  '#f97316','#22c55e','#06b6d4','#8b5cf6',
];

// Círculo exterior decorativo
ctx.strokeStyle = 'rgba(245,158,11,0.15)';
ctx.lineWidth = 1;
ctx.beginPath();
ctx.arc(cx, cy, R_outer + 20, 0, Math.PI * 2);
ctx.stroke();

ctx.strokeStyle = 'rgba(124,58,237,0.2)';
ctx.lineWidth = 1;
ctx.beginPath();
ctx.arc(cx, cy, R_inner - 20, 0, Math.PI * 2);
ctx.stroke();

// Signos zodiacales en círculo
zodiacSymbols.forEach((sym, i) => {
  const angle = (i / 12) * Math.PI * 2 - Math.PI / 2;
  const sx = cx + R_outer * Math.cos(angle);
  const sy = cy + R_outer * Math.sin(angle);

  // Círculo de fondo del signo
  const gSign = ctx.createRadialGradient(sx, sy, 0, sx, sy, 28);
  gSign.addColorStop(0, zodiacColors[i] + '40');
  gSign.addColorStop(1, 'transparent');
  ctx.fillStyle = gSign;
  ctx.beginPath();
  ctx.arc(sx, sy, 28, 0, Math.PI * 2);
  ctx.fill();

  // Símbolo
  ctx.fillStyle = zodiacColors[i];
  ctx.font = '26px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.globalAlpha = 0.9;
  ctx.fillText(sym, sx, sy);
  ctx.globalAlpha = 1;

  // Línea desde el centro
  ctx.strokeStyle = zodiacColors[i] + '20';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(cx + (R_inner - 20) * Math.cos(angle), cy + (R_inner - 20) * Math.sin(angle));
  ctx.lineTo(sx - 30 * Math.cos(angle), sy - 30 * Math.sin(angle));
  ctx.stroke();
});

// ── Estrella central grande ───────────────────────────────────────────────────
ctx.save();
ctx.translate(cx, cy - 90);
const starGlow = ctx.createRadialGradient(0, 0, 0, 0, 0, 80);
starGlow.addColorStop(0, 'rgba(245,158,11,0.6)');
starGlow.addColorStop(0.5, 'rgba(245,158,11,0.15)');
starGlow.addColorStop(1, 'transparent');
ctx.fillStyle = starGlow;
ctx.beginPath();
ctx.arc(0, 0, 80, 0, Math.PI * 2);
ctx.fill();

ctx.fillStyle = '#fbbf24';
ctx.font = 'bold 60px serif';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.shadowColor = 'rgba(245,158,11,0.8)';
ctx.shadowBlur = 20;
ctx.fillText('✦', 0, 0);
ctx.shadowBlur = 0;
ctx.restore();

// ── Texto Om Domo ─────────────────────────────────────────────────────────────
// Glow del texto
ctx.shadowColor = 'rgba(124,58,237,0.6)';
ctx.shadowBlur = 30;

const textGrad = ctx.createLinearGradient(cx - 200, 0, cx + 200, 0);
textGrad.addColorStop(0, '#a78bfa');
textGrad.addColorStop(0.5, '#ffffff');
textGrad.addColorStop(1, '#67e8f9');
ctx.fillStyle = textGrad;
ctx.font = 'bold 72px Georgia, serif';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText('Om Domo', cx, cy + 30);
ctx.shadowBlur = 0;

// Línea decorativa bajo el nombre
const lineGrad = ctx.createLinearGradient(cx - 160, 0, cx + 160, 0);
lineGrad.addColorStop(0, 'transparent');
lineGrad.addColorStop(0.3, '#f59e0b');
lineGrad.addColorStop(0.7, '#f59e0b');
lineGrad.addColorStop(1, 'transparent');
ctx.strokeStyle = lineGrad;
ctx.lineWidth = 2;
ctx.beginPath();
ctx.moveTo(cx - 160, cy + 65);
ctx.lineTo(cx + 160, cy + 65);
ctx.stroke();

// Subtítulo
ctx.fillStyle = 'rgba(245,158,11,0.8)';
ctx.font = '500 22px Georgia, serif';
ctx.letterSpacing = '4px';
ctx.fillText('NFT COLLECTION', cx, cy + 100);

// ── Texto inferior ────────────────────────────────────────────────────────────
ctx.fillStyle = 'rgba(255,255,255,0.2)';
ctx.font = '14px monospace';
ctx.fillText('Spiritual Web3 Lifestyle · Avalanche Mainnet · ERC-1155', cx, H - 50);

// ── Puntos de estrellas decorativas ──────────────────────────────────────────
const stars = [
  [100,100],[900,120],[50,500],[950,480],[120,880],[880,860],
  [300,60],[700,40],[60,300],[940,340],[400,940],[600,960],
];
stars.forEach(([x, y]) => {
  ctx.fillStyle = `rgba(255,255,255,${0.3 + Math.random() * 0.5})`;
  ctx.beginPath();
  ctx.arc(x, y, 1.5 + Math.random() * 2, 0, Math.PI * 2);
  ctx.fill();
});

// ── Borde exterior ────────────────────────────────────────────────────────────
const border = ctx.createLinearGradient(0, 0, W, H);
border.addColorStop(0, 'rgba(124,58,237,0.4)');
border.addColorStop(0.5, 'rgba(245,158,11,0.3)');
border.addColorStop(1, 'rgba(6,182,212,0.4)');
ctx.strokeStyle = border;
ctx.lineWidth = 3;
ctx.strokeRect(6, 6, W - 12, H - 12);

function download() {
  const link = document.createElement('a');
  link.download = 'omdomo-nft-collection.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
